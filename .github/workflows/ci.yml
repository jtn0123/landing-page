name: CI
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  check:
    # GitHub-hosted: the self-hosted runner is frequently offline and none of
    # these steps need local hardware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - run: npm run type-check
      - run: npm run lint
      - run: npm run build
      - run: bash scripts/check-bundle-size.sh

  e2e:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # CI runs Chromium only; Firefox/WebKit are available for local testing
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test --project=chromium
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  lighthouse:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
