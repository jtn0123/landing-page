name: CI
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  check:
    runs-on: [self-hosted, ci]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - run: npm run type-check
      - run: npm run lint
      - run: npm run build
      - run: bash scripts/check-bundle-size.sh

  e2e:
    runs-on: [self-hosted, ci]
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
      # CI runs Chromium only; Firefox/WebKit are available for local testing
      - name: Install Playwright system deps
        run: |
          rm -rf /var/lib/apt/lists/*
          apt-get update
          apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2 libxshmfence1
      - run: npx playwright install chromium
      - run: npx playwright test --project=chromium
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  lighthouse:
    runs-on: [self-hosted, ci]
    needs: check
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Chrome for Lighthouse
        run: |
          rm -rf /var/lib/apt/lists/*
          apt-get update
          apt-get install -y wget gnupg2
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list
          apt-get update
          apt-get install -y google-chrome-stable
        env:
          DEBIAN_FRONTEND: noninteractive
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable
        with:
          configPath: ./lighthouserc.json
