name: SonarQube

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  sonarqube:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork == false
    # GitHub-hosted: the scan uploads to SonarCloud, so nothing here needs
    # local hardware (the old self-hosted runner was just a runner)
    runs-on: ubuntu-latest
    # Informational only — a scan failure never blocks a PR
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:coverage
      # CI runners only have Chromium; Firefox/WebKit are for local testing
      - run: npx playwright test --project=chromium
      - uses: sonarsource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
