<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="red"/></marker>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="orange"/></marker>
    <marker id="ay" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#e6c619"/></marker>
  </defs>
  <!-- Field -->
  <rect width="500" height="400" fill="#2d5a1e"/>
  <line x1="0" y1="100" x2="500" y2="100" stroke="white" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.5"/>
  <line x1="0" y1="200" x2="500" y2="200" stroke="white" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.5"/>
  <line x1="0" y1="300" x2="500" y2="300" stroke="white" stroke-width="2" opacity="0.7"/>
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="bold">Spread Flood Right</text>
  <!-- Players -->
  <circle cx="250" cy="340" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="250" y="345" text-anchor="middle" fill="white" font-size="11" font-weight="bold">QB</text>
  <circle cx="250" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="250" y="305" text-anchor="middle" fill="white" font-size="11" font-weight="bold">C</text>
  <circle cx="60" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="60" y="305" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR1</text>
  <circle cx="150" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="150" y="305" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR2</text>
  <circle cx="350" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="350" y="305" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR3</text>
  <circle cx="440" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="440" y="305" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR4</text>
  <circle cx="310" cy="330" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="310" y="335" text-anchor="middle" fill="white" font-size="10" font-weight="bold">RB</text>
  <!-- Routes -->
  <!-- WR4: Flat (1st read) -->
  <polyline points="440,286 440,270 460,250" fill="none" stroke="red" stroke-width="3" marker-end="url(#ar)"/>
  <text x="468" y="248" fill="red" font-size="12" font-weight="bold">①</text>
  <!-- WR3: Corner (2nd read) -->
  <polyline points="350,286 350,220 400,160" fill="none" stroke="orange" stroke-width="3" marker-end="url(#ao)"/>
  <text x="408" y="158" fill="orange" font-size="12" font-weight="bold">②</text>
  <!-- RB: Wheel (3rd read) -->
  <polyline points="310,316 340,290 360,240 360,180" fill="none" stroke="#e6c619" stroke-width="3" marker-end="url(#ay)"/>
  <text x="368" y="178" fill="#e6c619" font-size="12" font-weight="bold">③</text>
  <!-- WR2: Dig -->
  <polyline points="150,286 150,220 210,220" fill="none" stroke="white" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#ay)"/>
  <!-- WR1: Go -->
  <polyline points="60,286 60,160" fill="none" stroke="white" stroke-width="2" stroke-dasharray="6,4"/>
</svg>