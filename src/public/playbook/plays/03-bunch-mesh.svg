<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="red"/></marker>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="orange"/></marker>
    <marker id="ay" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#e6c619"/></marker>
  </defs>
  <rect width="500" height="400" fill="#2d5a1e"/>
  <line x1="0" y1="100" x2="500" y2="100" stroke="white" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.5"/>
  <line x1="0" y1="200" x2="500" y2="200" stroke="white" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.5"/>
  <line x1="0" y1="300" x2="500" y2="300" stroke="white" stroke-width="2" opacity="0.7"/>
  <text x="250" y="30" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="bold">Bunch Right — Mesh</text>
  <!-- Bunch formation right side -->
  <circle cx="250" cy="340" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="250" y="345" text-anchor="middle" fill="white" font-size="11" font-weight="bold">QB</text>
  <circle cx="250" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="250" y="305" text-anchor="middle" fill="white" font-size="11" font-weight="bold">C</text>
  <circle cx="60" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="60" y="305" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR1</text>
  <!-- Bunch cluster -->
  <circle cx="370" cy="290" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="370" y="295" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR2</text>
  <circle cx="370" cy="260" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="370" y="265" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR3</text>
  <circle cx="400" cy="275" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="400" y="280" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR4</text>
  <circle cx="150" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="150" y="305" text-anchor="middle" fill="white" font-size="10" font-weight="bold">RB</text>
  <!-- Mesh crossing routes -->
  <!-- WR2: Shallow cross right-to-left (1st) -->
  <polyline points="370,276 350,250 200,240" fill="none" stroke="red" stroke-width="3" marker-end="url(#ar)"/>
  <text x="184" y="238" fill="red" font-size="12" font-weight="bold">①</text>
  <!-- WR1: Shallow cross left-to-right (2nd) -->
  <polyline points="60,286 80,260 250,250" fill="none" stroke="orange" stroke-width="3" marker-end="url(#ao)"/>
  <text x="258" y="248" fill="orange" font-size="12" font-weight="bold">②</text>
  <!-- WR3: Wheel up (3rd) -->
  <polyline points="370,246 370,160" fill="none" stroke="#e6c619" stroke-width="3" marker-end="url(#ay)"/>
  <text x="378" y="158" fill="#e6c619" font-size="12" font-weight="bold">③</text>
  <!-- WR4: Flat -->
  <polyline points="400,261 430,240 460,240" fill="none" stroke="white" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- RB: Block/checkdown -->
  <polyline points="150,286 150,260 120,260" fill="none" stroke="white" stroke-width="2" stroke-dasharray="6,4"/>
</svg>