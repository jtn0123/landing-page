<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="red"/></marker>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="orange"/></marker>
    <marker id="ay" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#e6c619"/></marker>
  </defs>
  <rect width="500" height="400" fill="#2d5a1e"/>
  <line x1="0" y1="100" x2="500" y2="100" stroke="white" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.5"/>
  <line x1="0" y1="200" x2="500" y2="200" stroke="white" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.5"/>
  <line x1="0" y1="300" x2="500" y2="300" stroke="white" stroke-width="2" opacity="0.7"/>
  <text x="250" y="30" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="bold">Stack Left — Quick Slants</text>
  <!-- Players -->
  <circle cx="250" cy="340" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="250" y="345" text-anchor="middle" fill="white" font-size="11" font-weight="bold">QB</text>
  <circle cx="250" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="250" y="305" text-anchor="middle" fill="white" font-size="11" font-weight="bold">C</text>
  <!-- Stack left - WR1 in front, WR2 behind -->
  <circle cx="80" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="80" y="305" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR1</text>
  <circle cx="80" cy="335" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="80" y="340" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR2</text>
  <circle cx="350" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="350" y="305" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR3</text>
  <circle cx="440" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="440" y="305" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR4</text>
  <circle cx="200" cy="340" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="200" y="345" text-anchor="middle" fill="white" font-size="10" font-weight="bold">RB</text>
  <!-- Routes -->
  <!-- WR1: Quick slant (1st) -->
  <polyline points="80,286 80,270 140,240" fill="none" stroke="red" stroke-width="3" marker-end="url(#ar)"/>
  <text x="148" y="238" fill="red" font-size="12" font-weight="bold">①</text>
  <!-- WR3: Slant from right (2nd) -->
  <polyline points="350,286 350,270 290,240" fill="none" stroke="orange" stroke-width="3" marker-end="url(#ao)"/>
  <text x="274" y="238" fill="orange" font-size="12" font-weight="bold">②</text>
  <!-- WR2: Out from stack (3rd) -->
  <polyline points="80,321 80,260 30,240" fill="none" stroke="#e6c619" stroke-width="3" marker-end="url(#ay)"/>
  <text x="14" y="238" fill="#e6c619" font-size="12" font-weight="bold">③</text>
  <!-- WR4: Go -->
  <polyline points="440,286 440,140" fill="none" stroke="white" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- RB: Checkdown -->
  <polyline points="200,326 200,290 240,270" fill="none" stroke="white" stroke-width="2" stroke-dasharray="6,4"/>
</svg>