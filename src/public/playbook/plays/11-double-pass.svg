<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="red"/></marker>
    <marker id="ap" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#c084fc"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#22c55e"/></marker>
  </defs>
  <rect width="500" height="400" fill="#2d5a1e"/>
  <line x1="0" y1="100" x2="500" y2="100" stroke="white" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.5"/>
  <line x1="0" y1="200" x2="500" y2="200" stroke="white" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.5"/>
  <line x1="0" y1="300" x2="500" y2="300" stroke="white" stroke-width="2" opacity="0.7"/>
  <text x="250" y="30" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="bold">Trips Left — Double Pass</text>
  <text x="250" y="50" text-anchor="middle" fill="#c084fc" font-family="Arial" font-size="13">⚠ TRICK PLAY</text>
  <!-- Players -->
  <circle cx="250" cy="340" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="250" y="345" text-anchor="middle" fill="white" font-size="11" font-weight="bold">QB</text>
  <circle cx="250" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="250" y="305" text-anchor="middle" fill="white" font-size="11" font-weight="bold">C</text>
  <circle cx="60" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="60" y="305" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR1</text>
  <circle cx="110" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="110" y="305" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR2</text>
  <circle cx="160" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="160" y="305" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR3</text>
  <circle cx="440" cy="300" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="440" y="305" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR4</text>
  <circle cx="310" cy="340" r="14" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="310" y="345" text-anchor="middle" fill="white" font-size="10" font-weight="bold">RB</text>
  <!-- Step 1: QB throws quick screen to WR1 -->
  <polyline points="250,326 130,290" fill="none" stroke="#22c55e" stroke-width="3" marker-end="url(#ag)"/>
  <text x="180" y="298" fill="#22c55e" font-size="10" font-weight="bold">1st PASS</text>
  <!-- WR1 catches, then throws deep to WR4 -->
  <polyline points="110,280 300,150 430,120" fill="none" stroke="#c084fc" stroke-width="3" marker-end="url(#ap)"/>
  <text x="300" y="140" fill="#c084fc" font-size="10" font-weight="bold">2nd PASS</text>
  <!-- WR4: Go deep -->
  <polyline points="440,286 440,130" fill="none" stroke="red" stroke-width="3" marker-end="url(#ar)"/>
  <text x="448" y="128" fill="red" font-size="12" font-weight="bold">①</text>
  <!-- WR2, WR3: Block/sell screen -->
  <text x="135" y="274" fill="white" font-size="9">BLOCK</text>
  <text x="85" y="274" fill="white" font-size="9">BLOCK</text>
  <!-- RB: Go right for misdirection -->
  <polyline points="310,326 370,290 420,280" fill="none" stroke="white" stroke-width="2" stroke-dasharray="6,4"/>
</svg>