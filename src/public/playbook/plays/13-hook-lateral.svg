  <text x="440" y="305" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WR4</text>
  <circle cx="300" cy="340" r="16" fill="#2563eb" stroke="white" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="300" y="345" text-anchor="middle" fill="white" font-size="10" font-weight="bold">RB</text>
  <!-- WR3: Hook route - catches ball -->
  <polyline points="340,286 340,210 330,220" fill="none" stroke="red" stroke-width="3.5" marker-end="url(#ar)"/>
  <text x="345" y="200" fill="red" font-size="10" font-weight="bold">HOOK</text>
  <!-- QB throws to WR3 on hook -->
  <polyline points="250,326 330,230" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#ag)"/>
  <text x="270" y="270" fill="#22c55e" font-size="10">PASS</text>
  <!-- WR3 laterals to WR4 running behind -->
  <polyline points="340,220 420,230" fill="none" stroke="#c084fc" stroke-width="3.5" marker-end="url(#ap)"/>
  <text x="360" y="214" fill="#c084fc" font-size="10" font-weight="bold">LATERAL</text>
  <!-- WR4: Timing route behind WR3 -->
  <polyline points="440,286 440,260 420,240" fill="none" stroke="orange" stroke-width="3.5"/>
  <text x="448" y="254" fill="orange" font-size="9">TRAIL</text>
  <!-- After lateral, WR4 runs upfield -->
  <polyline points="420,230 420,130" fill="none" stroke="#22c55e" stroke-width="3.5" marker-end="url(#ag)"/>
  <text x="428" y="150" fill="#22c55e" font-size="11" font-weight="bold">GO!</text>
